<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — SecureReg</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: #f0f2f5; min-height: 100vh;
    }

    nav {
      background: #0c2340; padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; transition: opacity 0.15s;
    }
    .nav-brand:hover { opacity: 0.85; }
    .nav-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.13);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .nav-icon svg { width: 16px; height: 16px; fill: white; }
    .nav-title { color: white; font-size: 15px; font-weight: 700; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link {
      color: rgba(255,255,255,0.72); text-decoration: none; font-size: 13px;
      padding: 6px 12px; border-radius: 6px; transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-link.active { background: rgba(255,255,255,0.16); color: white; font-weight: 600; }
    .logout-btn {
      color: rgba(255,255,255,0.72); background: none;
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 13px; padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 6px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    .page {
      max-width: 1000px; margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 26px; font-weight: 800; color: #1a202c; margin-bottom: 12px; }
    .page-header p { font-size: 13px; color: #718096; }

    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%; height: 40px; padding: 0 12px 0 36px;
      border: 1px solid #cbd5e0; border-radius: 8px;
      font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    .search-box input:focus {
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49,130,206,0.15);
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #a0aec0;
    }

    .sort-select {
      padding: 8px 12px; border-radius: 6px;
      border: 1px solid #cbd5e0; background: white;
      font-size: 13px; cursor: pointer;
    }

    .users-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .user-card {
      background: white; border-radius: 12px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .user-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .user-header {
      background: linear-gradient(135deg, #0c2340 0%, #1e4976 100%);
      padding: 1.5rem; text-align: center;
    }
    .user-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      font-size: 24px; font-weight: 800; color: white;
    }
    .user-name {
      color: white; font-size: 16px; font-weight: 700;
      margin-bottom: 4px;
    }
    .user-role {
      color: rgba(255,255,255,0.72); font-size: 12px;
    }

    .user-body {
      padding: 1.2rem;
    }
    .user-stat {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 8px 0; border-bottom: 1px solid #f7fafc;
      font-size: 12px;
    }
    .user-stat:last-child { border-bottom: none; }
    .stat-label { color: #718096; }
    .stat-value { color: #1a202c; font-weight: 700; }

    .user-actions {
      padding: 1rem; border-top: 1px solid #f7fafc;
      display: flex; gap: 8px;
    }
    .action-btn {
      flex: 1; padding: 6px 10px;
      border-radius: 6px; border: 1px solid #cbd5e0;
      background: white; color: #3182ce;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .action-btn:hover { background: #ebf4ff; }

    .status-badge {
      display: inline-flex; align-items: center;
      gap: 4px; padding: 3px 8px;
      border-radius: 12px; font-size: 11px; font-weight: 700;
    }
    .status-active { background: #f0fff4; color: #276749; }
    .status-active::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: #38a169;
    }
    .status-idle { background: #fffaf0; color: #7c2d12; }
    .status-idle::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: #ed8936;
    }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .confirm-box {
      background: white; border-radius: 14px;
      padding: 2rem; max-width: 360px; width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      text-align: center;
    }
    .confirm-box h3 { font-size: 17px; font-weight: 700; color: #1a202c; margin-bottom: 8px; }
    .confirm-box p { font-size: 13px; color: #718096; margin-bottom: 1.5rem; }
    .confirm-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel {
      padding: 9px 20px; border-radius: 8px; border: 1.5px solid #e2e8f0;
      background: white; color: #4a5568; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-confirm-red {
      padding: 9px 20px; border-radius: 8px; border: none;
      background: #c53030; color: white; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    /* ══════════════════════════════════════
       DARK MODE STYLES (GLOBAL)
    ══════════════════════════════════════ */
    body.dark-mode {
      background: #1a202c;
      color: #e2e8f0;
    }
    body.dark-mode nav {
      background: #0f1621;
    }
    body.dark-mode .page {
      background: #1a202c;
    }
    body.dark-mode .page-header h1 {
      color: #e2e8f0;
    }
    body.dark-mode .page-header p {
      color: #a0aec0;
    }
    body.dark-mode .controls {
      background: #2d3748;
    }
    body.dark-mode .search-box {
      background: #4a5568;
      color: #e2e8f0;
      border-color: #718096;
    }
    body.dark-mode .search-box::placeholder {
      color: #a0aec0;
    }
    body.dark-mode .user-card {
      background: #2d3748;
      border-color: #4a5568;
    }
    body.dark-mode .user-name {
      color: #e2e8f0;
    }
    body.dark-mode .user-info {
      color: #a0aec0;
    }
    body.dark-mode .user-status {
      color: #cbd5e0;
    }
    body.dark-mode .confirm-box {
      background: #2d3748;
    }
    body.dark-mode .confirm-box h3 {
      color: #e2e8f0;
    }
    body.dark-mode .confirm-box p {
      color: #a0aec0;
    }
    body.dark-mode .btn-cancel {
      background: #4a5568;
      color: #e2e8f0;
      border-color: #718096;
    }
    body.dark-mode .btn-cancel:hover {
      background: #718096;
    }

    @media (max-width: 768px) {
      .users-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/dashboard">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5L12 1z" fill="white"/>
      </svg>
    </div>
    <span class="nav-title">SecureReg</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/dashboard">Dashboard</a>
    <a class="nav-link" href="/activity">Activity</a>
    <a class="nav-link active" href="/users">Users</a>
    <a class="nav-link" href="/settings">Settings</a>
    <button class="logout-btn" type="button" onclick="openLogout()">Sign out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Registered Users</h1>
    <p>Browse and manage user profiles in the system</p>
  </div>

  <div class="controls">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" placeholder="Search users..." onkeyup="searchUsers(this.value)">
    </div>
    <select class="sort-select" onchange="sortUsers(this.value)">
      <option value="">Sort by...</option>
      <option value="name">Name (A-Z)</option>
      <option value="recent">Recently Joined</option>
      <option value="active">Last Active</option>
    </select>
  </div>

  <div class="users-grid" id="usersGrid">
    <!-- Users loaded from API -->
  </div>
</div>

<div class="overlay" id="logoutOverlay">
  <div class="confirm-box">
    <h3>Sign out?</h3>
    <p>Your session will be cleared and you'll return to the login page.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeLogout()">Cancel</button>
      <button class="btn-confirm-red" onclick="confirmLogout()">Sign out</button>
    </div>
  </div>
</div>

<script>
let allUsers = [];

// Load users on page load
document.addEventListener('DOMContentLoaded', () => {
  // Apply dark mode if enabled
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }
  loadUsers();
});

async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    const data = await res.json();
    
    if (data.success) {
      allUsers = data.users;
      renderUsers(allUsers);
    }
  } catch (err) {
    console.error('Error loading users:', err);
  }
}

// Render users as cards
function renderUsers(users) {
  const grid = document.getElementById('usersGrid');
  
  if (users.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #718096;">No users found.</div>';
    return;
  }
  
  grid.innerHTML = users.map(user => {
    const statusColor = user.status === 'active' ? 'status-active' : 'status-idle';
    const statusText = user.status === 'active' ? 'Active' : 'Idle';
    const avatar = user.username[0].toUpperCase();
    
    return `
      <div class="user-card" data-username="${user.username}">
        <div class="user-header">
          <div class="user-avatar">${avatar}</div>
          <div class="user-name">${user.username}</div>
          <div class="user-role">User</div>
        </div>
        <div class="user-body">
          <div class="user-stat">
            <span class="stat-label">Status</span>
            <span class="status-badge ${statusColor}">${statusText}</span>
          </div>
          <div class="user-stat">
            <span class="stat-label">Joined</span>
            <span class="stat-value">${user.joined}</span>
          </div>
          <div class="user-stat">
            <span class="stat-label">Last Login</span>
            <span class="stat-value">${user.last_login}</span>
          </div>
          <div class="user-stat">
            <span class="stat-label">Sessions</span>
            <span class="stat-value">N/A</span>
          </div>
        </div>
        <div class="user-actions">
          <button class="action-btn" onclick="viewProfile('${user.username}')">Profile</button>
          <button class="action-btn" onclick="viewActivity('${user.username}')">Activity</button>
        </div>
      </div>
    `;
  }).join('');
}

function searchUsers(query) {
  const filtered = allUsers.filter(user => 
    user.username.toLowerCase().includes(query.toLowerCase())
  );
  renderUsers(filtered);
}

function sortUsers(sortBy) {
  let sorted = [...allUsers];
  
  if (sortBy === 'name') {
    sorted.sort((a, b) => a.username.localeCompare(b.username));
  } else if (sortBy === 'recent') {
    // Already in reverse order from API
  }
  
  renderUsers(sorted);
}

function viewProfile(username) {
  alert(`Viewing profile for: ${username}`);
}

function viewActivity(username) {
  alert(`Viewing activity for: ${username}`);
}

function openLogout() {
  document.getElementById("logoutOverlay").style.display = "flex";
}
function closeLogout() {
  document.getElementById("logoutOverlay").style.display = "none";
}
function confirmLogout() {
  window.location.href = '/logout';
}
</script>
</body>
</html>
