<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureReg — Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      padding: 2.25rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: #0c2340;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 22px; height: 22px; fill: white; }
    .brand-name { font-size: 15px; font-weight: 700; color: #1a202c; line-height: 1.2; }
    .brand-sub  { font-size: 11.5px; color: #718096; }

    h2 { font-size: 21px; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #718096; margin-bottom: 1.75rem; }

    /* ── Fields ── */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: #4a5568; margin-bottom: 6px;
      letter-spacing: 0.07em; text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%; height: 42px; padding: 0 14px;
      border: 1.5px solid #cbd5e0; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      background: #fff; color: #1a202c;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49,130,206,0.15);
    }
    input.valid   { border-color: #38a169 !important; }
    input.invalid { border-color: #e53e3e !important; }

    /* ── Password wrapper ── */
    .pw-wrap { position: relative; }
    .toggle-pw {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #a0aec0; font-size: 11.5px; font-family: inherit;
      padding: 2px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .toggle-pw:hover { color: #3182ce; background: #ebf4ff; }

    /* ── Strength bar ── */
    .strength-wrap { margin-top: 10px; }
    .strength-track {
      height: 5px; background: #edf2f7;
      border-radius: 3px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 3px;
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,0,.2,1), background 0.3s;
    }
    .strength-label {
      font-size: 11.5px; color: #718096;
      margin-top: 5px; min-height: 16px;
      transition: color 0.2s;
    }

    /* ── Hint checklist ── */
    .hints {
      margin-top: 9px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .hint {
      font-size: 11.5px; color: #a0aec0;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .hint-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e2e8f0; flex-shrink: 0;
      transition: background 0.25s, transform 0.2s;
    }
    .hint.met { color: #276749; }
    .hint.met .hint-dot {
      background: #38a169;
      transform: scale(1.25);
    }

    /* ── CAPTCHA ── */
    .captcha-box {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 14px; background: #f7fafc;
    }
    .captcha-question {
      font-size: 20px; font-weight: 700; color: #1a202c;
      text-align: center; margin-bottom: 10px;
      letter-spacing: 0.06em;
      user-select: none;
    }
    .captcha-row { display: flex; gap: 8px; align-items: center; }
    .captcha-row input { flex: 1; }
    .refresh-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      border: 1.5px solid #cbd5e0; border-radius: 8px;
      background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.3s;
    }
    .refresh-btn:hover { background: #edf2f7; }
    .refresh-btn:active { transform: rotate(180deg); }
    .refresh-btn svg { width: 15px; height: 15px; stroke: #718096; fill: none; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%; height: 44px; margin-top: 1.4rem;
      background: #0c2340; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      letter-spacing: 0.02em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover:not(:disabled) {
      background: #1a3a5c;
      box-shadow: 0 4px 14px rgba(12,35,64,0.3);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      display: none; margin-top: 1rem;
      padding: 11px 14px; border-radius: 8px;
      font-size: 13px; border: 1px solid;
    }
    .toast.show { display: block; animation: toastIn 0.2s ease; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast.success { background: #f0fff4; color: #276749; border-color: #9ae6b4; }
    .toast.error   { background: #fff5f5; color: #c53030; border-color: #feb2b2; }

    /* ── Debug panel ── */
    .debug-panel {
      margin-top: 1rem; padding: 12px 14px;
      background: #1a202c; color: #68d391; border-radius: 8px;
      font-family: "Courier New", monospace; font-size: 11px;
      display: none; line-height: 1.7; word-break: break-all;
      border: 1px solid #2d3748;
    }

    /* ── Divider & footer ── */
    .divider { border: none; border-top: 1px solid #edf2f7; margin: 1.4rem 0; }
    .login-link { text-align: center; font-size: 12.5px; color: #718096; }
    .login-link a {
      color: #3182ce; text-decoration: none; font-weight: 600;
      transition: color 0.15s;
    }
    .login-link a:hover { color: #2b6cb0; text-decoration: underline; }

    /* ── Field hint text ── */
    .field-hint {
      font-size: 11.5px; margin-top: 5px;
      min-height: 16px; transition: color 0.2s;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5L12 1z"/></svg>
    </div>
    <div>
      <div class="brand-name">SecureReg</div>
      <div class="brand-sub">CET324 — Advanced CyberSecurity</div>
    </div>
  </div>

  <h2>Create an account</h2>
  <p class="subtitle">Fill in your details below to register securely.</p>

  <!-- Username -->
  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="e.g. john_doe"
           autocomplete="off" oninput="onUsernameInput(this.value)"/>
    <div class="field-hint" id="usernameMsg" style="color:#718096;"></div>
  </div>

  <!-- Password -->
  <div class="field">
    <label for="password">Password</label>
    <div class="pw-wrap">
      <input type="password" id="password"
             placeholder="Create a strong password"
             autocomplete="new-password"
             oninput="onPasswordInput(this.value)"/>
      <button class="toggle-pw" type="button" onclick="togglePw('password', this)">show</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-track">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
      <div class="hints">
        <div class="hint" id="h-length"><span class="hint-dot"></span>Min 8 characters</div>
        <div class="hint" id="h-upper"> <span class="hint-dot"></span>Uppercase (A–Z)</div>
        <div class="hint" id="h-lower"> <span class="hint-dot"></span>Lowercase (a–z)</div>
        <div class="hint" id="h-number"><span class="hint-dot"></span>Number (0–9)</div>
        <div class="hint" id="h-special"><span class="hint-dot"></span>Special character</div>
      </div>
    </div>
  </div>

  <!-- CAPTCHA -->
  <div class="field">
    <label>Human verification</label>
    <div class="captcha-box">
      <div class="captcha-question" id="captchaQ">Loading…</div>
      <div class="captcha-row">
        <input type="text" id="captchaAns" placeholder="Your answer"
               autocomplete="off" inputmode="numeric"/>
        <button class="refresh-btn" type="button"
                onclick="refreshCaptcha()" title="New question">
          <svg viewBox="0 0 24 24" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10
                     M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submitBtn" type="button" onclick="handleRegister()">
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Create account</span>
  </button>

  <div class="toast" id="toast"></div>
  <div class="debug-panel" id="debugPanel"></div>

  <hr class="divider"/>
<p class="login-link">
  Already have an account? <a href="/login">Sign in</a>
</p>
</div>

<script>
  /* ═══════════════════════════════════════════
     COMMON PASSWORDS BLOCKLIST (client-side)
  ═══════════════════════════════════════════ */
  const COMMON_PASSWORDS = new Set([
    "password","123456","password1","qwerty","letmein",
    "welcome","monkey","dragon","master","123456789",
    "abc123","iloveyou","admin","passw0rd","sunshine"
  ]);

  /* ═══════════════════════════════════════════
     CAPTCHA — backend-driven only
     Frontend displays what backend generates
  ═══════════════════════════════════════════ */

  function loadCaptcha() {
    fetch("/captcha/refresh")
      .then(r => r.json())
      .then(d => {
        if (d && d.question) {
          document.getElementById("captchaQ").textContent = d.question;
        }
      })
      .catch(() => {
        document.getElementById("captchaQ").textContent = "Error loading CAPTCHA. Refresh page.";
      });
    document.getElementById("captchaAns").value = "";
  }

  function refreshCaptcha() {
    loadCaptcha();
  }

  /* ═══════════════════════════════════════════
     PASSWORD STRENGTH — client-side with
     optional backend confirmation
  ═══════════════════════════════════════════ */
  let strengthScore = 0;

  function getPasswordRules(pw) {
    return {
      length:    pw.length >= 8,
      uppercase: /[A-Z]/.test(pw),
      lowercase: /[a-z]/.test(pw),
      number:    /[0-9]/.test(pw),
      special:   /[!@#$%^&*()\-_=+\[\]{};:'",.<>\/?\\|`~]/.test(pw),
    };
  }

  async function onPasswordInput(pw) {
    if (!pw) { resetStrength(); return; }

    const rules    = getPasswordRules(pw);
    const isCommon = COMMON_PASSWORDS.has(pw.toLowerCase());
    const score    = Object.values(rules).filter(Boolean).length;

    /* Try backend; silently use client logic if unavailable */
    try {
      const res  = await fetch("/check-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        const data = await res.json();
        applyStrengthUI(data.rules, data.score, data.is_common);
        return;
      }
    } catch (_) {}

    /* Fallback: pure client-side */
    applyStrengthUI(rules, score, isCommon);
  }

  function applyStrengthUI(rules, score, isCommon) {
    strengthScore = isCommon ? 0 : score;

    toggleHint("h-length",  rules.length);
    toggleHint("h-upper",   rules.uppercase);
    toggleHint("h-lower",   rules.lowercase);
    toggleHint("h-number",  rules.number);
    toggleHint("h-special", rules.special);

    const fill  = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");

    if (isCommon) {
      fill.style.width      = "20%";
      fill.style.background = "#e53e3e";
      label.textContent     = "Very weak — common password, choose another";
      label.style.color     = "#e53e3e";
      return;
    }

    const map = {
      0: ["5%",   "#e53e3e", "",                              "#a0aec0"],
      1: ["20%",  "#e53e3e", "Weak — keep going",             "#e53e3e"],
      2: ["40%",  "#dd6b20", "Fair — add more variety",       "#dd6b20"],
      3: ["60%",  "#d69e2e", "Medium — almost there",         "#d69e2e"],
      4: ["80%",  "#38a169", "Good — add one more condition", "#38a169"],
      5: ["100%", "#276749", "Strong password \u2713",        "#276749"],
    };
    var s = map[score] || map[0];
    fill.style.width      = s[0];
    fill.style.background = s[1];
    label.textContent     = s[2];
    label.style.color     = s[3];
  }

  function toggleHint(id, met) {
    document.getElementById(id).classList.toggle("met", Boolean(met));
  }

  function resetStrength() {
    strengthScore = 0;
    document.getElementById("strengthFill").style.width = "0%";
    document.getElementById("strengthLabel").textContent = "";
    document.getElementById("strengthLabel").style.color = "#718096";
    ["h-length","h-upper","h-lower","h-number","h-special"]
      .forEach(function(id) { document.getElementById(id).classList.remove("met"); });
  }

  /* ═══════════════════════════════════════════
     USERNAME INPUT FEEDBACK
  ═══════════════════════════════════════════ */
  function onUsernameInput(val) {
    var msg = document.getElementById("usernameMsg");
    var inp = document.getElementById("username");
    if (!val) { msg.textContent = ""; inp.className = ""; return; }
    if (val.length < 3) {
      msg.textContent = "Must be at least 3 characters.";
      msg.style.color = "#e53e3e"; inp.className = "invalid";
    } else if (!/^[a-zA-Z0-9_]+$/.test(val)) {
      msg.textContent = "Only letters, numbers, and underscores allowed.";
      msg.style.color = "#e53e3e"; inp.className = "invalid";
    } else {
      msg.textContent = "\u2713 Looks good!";
      msg.style.color = "#38a169"; inp.className = "valid";
    }
  }

  /* ═══════════════════════════════════════════
     SHOW / HIDE PASSWORD
  ═══════════════════════════════════════════ */
  function togglePw(inputId, btn) {
    var inp = document.getElementById(inputId);
    var isText = inp.type === "text";
    inp.type = isText ? "password" : "text";
    btn.textContent = isText ? "show" : "hide";
  }

  /* ═══════════════════════════════════════════
     REGISTER SUBMIT
  ═══════════════════════════════════════════ */
  async function handleRegister() {
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;
    var captchaInput = document.getElementById("captchaAns").value.trim();

    /* Validate username */
    if (!username || username.length < 3) {
      showToast("Username must be at least 3 characters.", "error"); return;
    }
    if (!/^[a-zA-Z0-9_]+$/.test(username)) {
      showToast("Username: letters, numbers, underscores only.", "error"); return;
    }
    /* Validate password strength */
    if (!password) {
      showToast("Please enter a password.", "error"); return;
    }
    if (strengthScore < 4) {
      showToast("Password is too weak. Meet all 5 requirements.", "error"); return;
    }
    /* Validate CAPTCHA */
    if (!captchaInput) {
      showToast("Please answer the CAPTCHA.", "error"); return;
    }
    var userAnswer = parseInt(captchaInput, 10);
    if (isNaN(userAnswer)) {
      showToast("CAPTCHA answer must be a number.", "error"); return;
    }
    /* Backend will validate CAPTCHA — don't check client-side */

    setLoading(true);

    try {
      var res  = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username, password: password, captcha: captchaInput })
      });
      var data = await res.json();

      if (data.success) {
        showToast(data.message || "Account created! Redirecting…", "success");
        if (data.hash_preview) {
          var panel = document.getElementById("debugPanel");
          panel.style.display = "block";
          panel.innerHTML =
            '<strong style="color:#fbd38d">bcrypt hash stored (demo):</strong><br>' +
            escapeHtml(data.hash_preview);
        }
        clearForm();
        setTimeout(function() {
          window.location.href = data.redirect || "/login";
        }, 2200);
      } else {
        showToast(data.error || "Registration failed.", "error");
        if (data.error && data.error.toLowerCase().includes("captcha")) {
          loadCaptcha();
        }
      }
    } catch (err) {
      showToast("Cannot reach server. Make sure App.py is running.", "error");
    }

    setLoading(false);
  }

  /* ═══════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════ */
  function setLoading(on) {
    var btn     = document.getElementById("submitBtn");
    var spinner = document.getElementById("spinner");
    var text    = document.getElementById("btnText");
    btn.disabled          = on;
    spinner.style.display = on ? "block" : "none";
    text.textContent      = on ? "Registering\u2026" : "Create account";
  }

  function clearForm() {
    document.getElementById("username").value   = "";
    document.getElementById("password").value   = "";
    document.getElementById("captchaAns").value = "";
    document.getElementById("usernameMsg").textContent = "";
    document.getElementById("username").className = "";
    resetStrength();
    loadCaptcha();
  }

  var toastTimer = null;
  function showToast(msg, type) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = "toast " + type + " show";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.className = "toast"; }, 5000);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  /* Enter key shortcut */
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleRegister();
  });

  /* Load CAPTCHA from backend on page load */
  loadCaptcha();
</script>
</body>
</html>
